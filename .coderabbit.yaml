language: en-US
tone_instructions: "Be concise and technical. Prioritise correctness, COM lifecycle safety, STA thread discipline, and SQL injection risks."
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false

  # Exclude build artefacts and generated files from review.
  path_filters:
    - "!**/bin/**"
    - "!**/obj/**"
    - "!**/publish/**"
    - "!**/*.pubxml"
    - "!**/*.suo"
    - "!**/*.user"
    - "!**/*.Designer.cs"

  # Per-path review guidance.
  path_instructions:
    - path: "src/SolidWorksPartMatcher.SolidWorks/**"
      instructions: |
        All SolidWorks COM API calls must run exclusively on the dedicated STA thread
        via StaSolidWorksWorker. Flag any COM call made outside a RunAsync delegate.
        Flag COM objects (IBody2, IFeature, IMassProperty, etc.) that are not released
        via Marshal.ReleaseComObject when they are short-lived.
        Verify every SW API method name against the installed SW 2024 interop — do not
        accept invented or guessed method names. Flag any vtable-unsafe patterns.

    - path: "src/SolidWorksPartMatcher.Domain/**"
      instructions: |
        The Domain layer must not reference COM, WPF, SQLite, ClosedXML, AI SDKs,
        or any infrastructure concern. Flag any dependency that violates this boundary.
        All types should be immutable records or value objects where possible.

    - path: "src/SolidWorksPartMatcher.Infrastructure/**"
      instructions: |
        Flag any raw string interpolation in SQLite queries that could enable SQL injection.
        All parameters must be passed via SqliteParameter or AddWithValue.
        Ensure CancellationToken is propagated through all async paths.
        Database writes must be transactional — flag bare non-transactional writes.

    - path: "src/SolidWorksPartMatcher.Application/**"
      instructions: |
        Interfaces must use immutable DTOs across layer boundaries.
        Flag any interface that leaks infrastructure types (COM objects, EF entities, etc.).

    - path: "src/SolidWorksPartMatcher.App/**"
      instructions: |
        This is the WPF/MVVM layer. Flag any business logic that belongs in the Domain
        or Application layers instead. Flag direct repository or COM access from ViewModels.
        All long-running operations must report progress and support CancellationToken.

    - path: "tests/**"
      instructions: |
        Flag any test that mocks the SQLite database — integration tests must hit a real DB.
        All test fixtures must be deterministic (no DateTime.Now, no random GUIDs as inputs).
        Ensure each test has a single clear assertion focus.

knowledge_base:
  opt_out: false
